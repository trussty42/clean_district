<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Чистый квартал — Вход</title>
    <link rel="stylesheet" href="./fonts/fonts.css" />
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="./styles/auth.css" />
    <link rel="icon" href="./images/logo.svg" sizes="any">
    <link rel="icon" href="./images/logo.svg" type="image/svg+xml">
</head>
<body>
    <div class="auth-layout">
        <div class="auth-image-wrapper">
            <img src="./images/auth-bg.jpg" alt="Вход и регистрация" class="auth-image">
        </div>

        <div class="auth-form-wrapper">
            <a href="index.html" class="auth-logo">
                <img src="./images/logo.svg" alt="Логотип">
                <span>чистый<br>квартал</span>
            </a>

            <div class="auth-form-container">
                <form id="loginForm" class="auth-form active">
                    <h2 class="auth-title">ВХОД В АККАУНТ</h2>
                    
                    <div class="form-group">
                        <label for="loginInput">Логин или почта</label>
                        <input type="text" id="loginInput" placeholder="Введите ваш логин или email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="loginPassword">Пароль</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="loginPassword" placeholder="Введите ваш пароль" required>
                            <button type="button" class="toggle-password" aria-label="Показать пароль">
                                <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                <svg class="eye-off-icon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" name="remember">
                            <span>Запомнить меня</span>
                        </label>
                        <a href="#" class="link">Забыли пароль?</a>
                    </div>

                    <button type="submit" class="btn-primary btn-full">Войти</button>
                    
                    <div class="divider"><span>или</span></div>
                    <p class="auth-footer">Нет аккаунта? <a href="#" class="link switch-to-register">Зарегистрироваться</a></p>
                </form>

                <form id="registerForm" class="auth-form">
                    <h2 class="auth-title">РЕГИСТРАЦИЯ</h2>

                    <div class="form-fields user-fields">
                        <div class="form-group">
                            <label>Логин</label>
                            <input type="text" name="login" placeholder="Введите ваш логин" required>
                        </div>
                        <div class="form-group">
                            <label>Почта</label>
                            <input type="email" name="email" placeholder="Введите ваш email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Пароль</label>
                        <div class="form-group-password">
                            <div class="password-input-wrapper">
                                <input type="password" name="password" placeholder="Придумайте пароль" required>
                                <button type="button" class="toggle-password">
                                    <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                    <svg class="eye-off-icon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                                </button>
                            </div>
                            <div class="password-input-wrapper">
                                <input type="password" name="passwordConfirm" placeholder="Подтвердите пароль" required>
                                <button type="button" class="toggle-password">
                                    <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                    <svg class="eye-off-icon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" name="agreeTerms" required>
                            <span>Я ознакомлен(а) с <a href="#" class="link">Пользовательским соглашением</a>.</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="agreeData" required>
                            <span>Я даю согласие на <a href="#" class="link">обработку персональных данных</a>.</span>
                        </label>
                    </div>

                    <button type="submit" class="btn-primary btn-full">Зарегистрироваться</button>
                    
                    <div class="divider"><span>или</span></div>
                    <p class="auth-footer">Уже есть аккаунт? <a href="#" class="link switch-to-login">Войти</a></p>
                </form>
            </div>
        </div>
    </div>

    <script src="./scripts/auth.js" defer></script>
</body>
</html>
